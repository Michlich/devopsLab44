replicaCount: 1
image:
  repository: my-program2 # Будет заменено на ваш образ из Docker Hub
  pullPolicy: IfNotPresent
  tag: "latest"
service:
  type: NodePort
  port: 8080
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50 # Если CPU > 50%, поднимет поды
